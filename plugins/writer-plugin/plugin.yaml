      review_document: {label: 审阅文档}
      finalize_report: {label: 产出成稿}
    tabs:
      context: {label: 写作上下文}
      outline: {label: 大纲}
      plan_sections: {label: 章节指令}
      draft: {label: 初稿}
      review: {label: 审阅}
      result: {label: 最终成稿}
    slots:
      writing_task_slot: {label: 写作任务}
      resource_profiles_slot: {label: 资源画像}
      writing_context_slot: {label: 写作上下文}
      outline_slot: {label: 大纲}
      section_instructions_slot: {label: 章节指令}
