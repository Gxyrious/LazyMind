id: writer-plugin
name: AI Writer
description: >
  撰写长篇文章或技术报告。工作流分六步：解析写作意图与边界、
  生成大纲、为每章规划写作指令、撰写全文初稿、审阅初稿并给出修订意见、
  产出最终成稿。每一步都支持通过状态机自环进行整体重跑。

when_to_use: >
  当用户希望撰写、起草、生成一篇较长的文章、报告、技术文档、综述、
  说明文或任何结构化长文本时调用本插件。典型请求如「写一篇关于 X 的报告」、
  「帮我起草一份 Y 的技术文章」、「写一篇综述」、「生成一篇关于 Z 的介绍」、
  「请就某主题写一篇文章」等。不适用于单段话的简短改写或翻译。

tool_scripts:
  - path: scripts/tools.py
    functions:
      - build_writing_task
      - profile_resources
      - create_writing_context
      - generate_outline
      - generate_section_instructions
      - generate_draft_section
      - assemble_draft_document
      - update_writing_context
      - check_consistency
      - generate_writing_output

steps:
  - id: build_context
    label: Build Context
  - id: generate_outline
    label: Generate Outline
  - id: plan_sections
    label: Plan Sections
  - id: generate_draft
    label: Generate Draft
  - id: review_document
    label: Review Document
  - id: finalize_report
    label: Finalize Report

ui:
  tabs:
    - id: context
      label: Context
      layout: list
      slots:
        - id: writing_task_slot
          label: Writing Task
          type: text
          cardinality: single
          artifact_key: writing_task
        - id: resource_profiles_slot
          label: Resource Profiles
          type: text
          cardinality: single
          artifact_key: resource_profiles
        - id: writing_context_slot
          label: Writing Context
          type: text
          cardinality: single
          artifact_key: writing_context
          summary_max_chars: 600

    - id: outline
      label: Outline
      layout: list
      slots:
        - id: outline_slot
          label: Outline
          type: text
          cardinality: single
          artifact_key: outline

    - id: plan_sections
      label: Plan Sections
      layout: list
      slots:
        - id: section_instructions_slot
          label: Section Instructions
          type: text
          cardinality: list
          artifact_key: section_instructions

    - id: draft
      label: Draft
      layout: list
      slots:
        - id: draft_sections_slot
          label: Draft Sections
          type: text
          cardinality: list
          ordered: true
          artifact_key: draft_sections

        - id: draft_slot
          label: Full Draft
          type: text
          cardinality: single
          artifact_key: draft_document

    - id: review
      label: Review
      layout: list
      slots:
        - id: review_slot
          label: Review Report
          type: text
          cardinality: single
          artifact_key: review_report

    - id: result
      label: Final Report
      layout: list
      slots:
        - id: final_report_slot
          label: Final Report
          type: text
          cardinality: single
          artifact_key: writing_output

i18n:
