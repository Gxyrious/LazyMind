initial: __start__

transitions:
  __start__:
    - to: build_context
      condition: "Cold start — always enter context building first."

  build_context:
    - to: generate_outline
      condition: "Context ready — proceed to outline planning."

  generate_outline:
    - to: plan_sections
      condition: "Outline accepted — proceed to per-section instruction planning."

  plan_sections:
    - to: generate_draft
      condition: "Section instructions ready — proceed to draft writing."

  generate_draft:
    - to: review_document
      condition: "Full draft produced — proceed to review."

  review_document:
    - to: finalize_report
      condition: "Review complete — proceed to finalization."

  finalize_report:
    - to: __end__
      condition: "Final report produced — pipeline complete."

steps:
  build_context:
    label: Build Context
    prompt: |
      {{runtime_instruction}}

      本步准备写作上下文。先调 profile_resources(query="{{user_input}}") 拿到 resource_profiles 路径，把它作为 resource_profiles_path 传给 create_writing_context(query="{{user_input}}") 得到 writing_context 路径。resource_profiles 和 writing_context 分别用 save_artifact(content_type='file') 落库。
    tools:
      - profile_resources
      - create_writing_context
    outputs:
      - artifact_id: resource_profiles
        content_type: json
        slot_id: null
      - artifact_id: writing_context
        content_type: json
        slot_id: writing_context_slot
    acceptance_criteria: |
      writing_context 已保存；context_id 非空；document_summary.summary 非空、key_points 至少 1 条；style_profile 含 audience、formality、tone 三字段。

  generate_outline:
    label: Generate Outline
    prompt: |
      {{runtime_instruction}}

      本步基于 writing_context 生成结构化大纲。调 get_artifact 取回 writing_context，传给 generate_outline，把返回的路径用 save_artifact(content_type='file', key='outline') 落库。
    tools:
      - generate_outline
    exclude_framework_tools:
      - read_user_attachment
      - find_user_attachment
    inputs:
      - artifact_id: writing_context
        required: true
    outputs:
      - artifact_id: outline
        content_type: json
        slot_id: outline_slot
    acceptance_criteria: |
      outline 已保存；nodes 至少 3 个；每个 node 至少含 node_id、title、instruction 字段且非空。

  plan_sections:
    label: Plan Sections
    prompt: |
      {{runtime_instruction}}

      本步为大纲中每章生成写作指令。调 get_artifact 取回 writing_context 和 outline，传给 generate_section_instructions，把返回的路径用 save_artifact(content_type='file', key='section_instructions') 落库。
    tools:
      - generate_section_instructions
    exclude_framework_tools:
      - read_user_attachment
      - find_user_attachment
    inputs:
      - artifact_id: outline
        required: true
      - artifact_id: writing_context
        required: true
    outputs:
      - artifact_id: section_instructions
        content_type: json
        slot_id: section_instructions_slot
    acceptance_criteria: |
      section_instructions 已保存；条目数与 outline.nodes 节点数一一对应；每条至少含 outline_node_id、section_title、section_goal、required_points 字段。

  generate_draft:
    label: Generate Draft
    prompt: |
      {{runtime_instruction}}

      本步按章节指令串行撰写初稿正文。调 get_artifact 取回 writing_context 和 section_instructions，传给 generate_draft_section。返回的 dict 包含 draft_sections_path 和 draft_document_path，分别 save_artifact(content_type='file') 落库。
    tools:
      - generate_draft_section
    exclude_framework_tools:
      - read_user_attachment
      - find_user_attachment
    inputs:
      - artifact_id: writing_context
        required: true
      - artifact_id: outline
        required: true
      - artifact_id: section_instructions
        required: true
    outputs:
      - artifact_id: draft_sections
        content_type: json
        slot_id: draft_sections_slot
      - artifact_id: draft_document
        content_type: json
        slot_id: draft_slot
    acceptance_criteria: |
      draft_sections 与 draft_document 已保存。draft_sections 至少 2 个 DraftSection，每个含 title 且 blocks 非空（每 block content 非空）。draft_document.sections 与 draft_sections 一一对应。

  review_document:
    label: Review Document
    prompt: |
      {{runtime_instruction}}

      本步对初稿做一致性与质量审阅。调 get_artifact 取回 writing_context 和 draft_document，传给 check_consistency，把返回的路径用 save_artifact(content_type='file', key='review_report') 落库。
    tools:
      - check_consistency
    exclude_framework_tools:
      - read_user_attachment
      - find_user_attachment
    inputs:
      - artifact_id: draft_document
        required: true
      - artifact_id: writing_context
        required: true
    outputs:
      - artifact_id: review_report
        content_type: json
        slot_id: review_slot
    acceptance_criteria: |
      review_report 已保存；result.is_passed 是布尔；result.score 是 0-100 数字；result.summary 是非空字符串；result.issues 是数组，每项含 severity（high/medium/low）、category、description 字段。

  finalize_report:
    label: Finalize Report
    prompt: |
      {{runtime_instruction}}

      本步结合审阅意见产出最终成稿。调 get_artifact 取回 writing_context、draft_document 和 review_report，传给 generate_writing_output，把返回的路径用 save_artifact(content_type='file', key='writing_output') 落库。
    tools:
      - generate_writing_output
    exclude_framework_tools:
      - read_user_attachment
      - find_user_attachment
    inputs:
      - artifact_id: draft_document
        required: true
      - artifact_id: review_report
        required: true
      - artifact_id: writing_context
        required: false
    outputs:
      - artifact_id: writing_output
        content_type: json
        slot_id: final_report_slot
    acceptance_criteria: |
      writing_output 已保存；output_format 是 markdown；content 是非空字符串，含标题与至少 2 个二级章节（`## ` 开头），正文长度足以独立成篇。