initial: __start__

transitions:
  __start__:
    - to: build_context
      condition: "Cold start — always enter context building first."

  build_context:
    - to: plan_outline
      condition: "Context ready — proceed to outline planning."

  plan_outline:
    - to: write_draft
      condition: "Outline accepted — proceed to draft writing."

  write_draft:
    - to: review_draft
      condition: "Full draft produced — proceed to review."

  review_draft:
    - to: finalize_report
      condition: "Review complete — proceed to finalization."

  finalize_report:
    - to: __end__
      condition: "Final report produced — pipeline complete."

steps:
  build_context:
    label: Build Context
    prompt: |
      {{user_input}}

      {{runtime_instruction}}

      你的任务：调用以下工具完成本 step。
      1. `profile_resources(query="{{user_input}}")`
      2. `create_writing_context(resource_profiles_key="resource_profiles", query="{{user_input}}")`

      工具会自行把产物落库到 artifact。等两个工具都返回确认串后，调用 advance_step。
    tools:
      - profile_resources
      - create_writing_context
    outputs:
      - artifact_id: writing_context
        content_type: json
        slot_id: writing_context_slot
    acceptance_criteria: |
      writing_context artifact must be saved and contain non-empty topic, audience,
      and subtopics/style fields.

  plan_outline:
    label: Plan Outline
    prompt: |
      {{user_input}}

      {{runtime_instruction}}

      你的任务：调用 `generate_outline(writing_context_key="writing_context")`，等待确认串后调用 advance_step。
    tools:
      - generate_outline
    inputs:
      - artifact_id: writing_context
        required: true
    outputs:
      - artifact_id: outline
        content_type: json
        slot_id: outline_slot
    acceptance_criteria: |
      outline artifact must be saved with ≥ 3 top-level sections, each with a
      one-line purpose.

  write_draft:
    label: Write Draft
    prompt: |
      {{user_input}}

      {{runtime_instruction}}

      你的任务：按顺序调用两个工具。
      1. `generate_section_instructions(outline_key="outline", writing_context_key="writing_context")`
      2. `generate_draft_section(section_instructions_key="section_instructions", writing_context_key="writing_context")`

      等两个工具都返回确认串后，调用 advance_step。
    tools:
      - generate_section_instructions
      - generate_draft_section
    inputs:
      - artifact_id: writing_context
        required: true
      - artifact_id: outline
        required: true
    outputs:
      - artifact_id: draft_section
        content_type: json
        slot_id: draft_sections_slot
      - artifact_id: draft
        content_type: json
        slot_id: draft_slot
    acceptance_criteria: |
      draft and draft_section artifacts must be saved with substantive prose
      following the outline.

  review_draft:
    label: Review Draft
    prompt: |
      {{user_input}}

      {{runtime_instruction}}

      你的任务：调用 `check_consistency(draft_key="draft", writing_context_key="writing_context")`，等待确认串后调用 advance_step。
    tools:
      - check_consistency
    inputs:
      - artifact_id: draft
        required: true
      - artifact_id: writing_context
        required: true
    outputs:
      - artifact_id: review_report
        content_type: json
        slot_id: review_slot
    acceptance_criteria: |
      review_report artifact must be saved with a numeric score, summary, and a
      list of issues.

  finalize_report:
    label: Finalize Report
    prompt: |
      {{user_input}}

      {{runtime_instruction}}

      你的任务：调用 `generate_writing_output(draft_key="draft", review_report_key="review_report", writing_context_key="writing_context")`，等待确认串后调用 advance_step。
    tools:
      - generate_writing_output
    inputs:
      - artifact_id: draft
        required: true
      - artifact_id: review_report
        required: true
      - artifact_id: writing_context
        required: false
    outputs:
      - artifact_id: final_report
        content_type: json
        slot_id: final_report_slot
    acceptance_criteria: |
      final_report artifact must be saved as a self-contained polished Markdown
      article.
