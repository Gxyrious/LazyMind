initial: __start__

transitions:
  __start__:
    - to: build_context
      condition: "Cold start — always enter context building first."

  build_context:
    - to: generate_outline
      condition: "Context ready — proceed to outline planning."

  generate_outline:
    - to: plan_sections
      condition: "Outline accepted — proceed to per-section instruction planning."

  plan_sections:
    - to: generate_draft
      condition: "Section instructions ready — proceed to draft writing."

  generate_draft:
    - to: review_document
      condition: "Full draft produced — proceed to review."

  review_document:
    - to: finalize_report
      condition: "Review complete — proceed to finalization."

  finalize_report:
    - to: __end__
      condition: "Final report produced — pipeline complete."

steps:
  build_context:
    label: Build Context
    allow_llm_save_artifact: false
    prompt: |
      用户的写作目标是：{{user_input}}

      {{runtime_instruction}}

      本步先把写作上下文准备好。按顺序调用以下两个工具，完成后向用户简短回报即可。
      1. `profile_resources(query="{{user_input}}")`
      2. `create_writing_context(resource_profiles_key="resource_profiles", query="{{user_input}}")`
    tools:
      - profile_resources
      - create_writing_context
    outputs:
      - artifact_id: writing_context
        content_type: json
        slot_id: writing_context_slot
    acceptance_criteria: |
      writing_context artifact must be saved and contain non-empty topic, audience,
      and subtopics/style fields.

  generate_outline:
    label: Generate Outline
    allow_llm_save_artifact: false
    prompt: |
      用户的写作目标是：{{user_input}}

      {{runtime_instruction}}

      本步基于已有上下文生成结构化大纲。调用 `generate_outline(writing_context_key="writing_context")`，收到确认后向用户简短回报即可。
    tools:
      - generate_outline
    inputs:
      - artifact_id: writing_context
        required: true
    outputs:
      - artifact_id: outline
        content_type: json
        slot_id: outline_slot
    acceptance_criteria: |
      outline artifact must be saved with ≥ 3 top-level sections, each with a
      one-line purpose.

  plan_sections:
    label: Plan Sections
    allow_llm_save_artifact: false
    prompt: |
      用户的写作目标是：{{user_input}}

      {{runtime_instruction}}

      本步为大纲中每章生成写作指令。调用 `generate_section_instructions(outline_key="outline", writing_context_key="writing_context")`，收到确认后向用户简短回报即可。
    tools:
      - generate_section_instructions
    inputs:
      - artifact_id: outline
        required: true
      - artifact_id: writing_context
        required: true
    outputs:
      - artifact_id: section_instructions
        content_type: json
        slot_id: section_instructions_slot
    acceptance_criteria: |
      section_instructions artifact must be saved, with one instruction per
      top-level outline node.

  generate_draft:
    label: Generate Draft
    allow_llm_save_artifact: false
    prompt: |
      用户的写作目标是：{{user_input}}

      {{runtime_instruction}}

      本步按章节指令串行撰写初稿。调用 `generate_draft_section(section_instructions_key="section_instructions", writing_context_key="writing_context")`，收到确认后向用户简短回报即可。
    tools:
      - generate_draft_section
    inputs:
      - artifact_id: writing_context
        required: true
      - artifact_id: outline
        required: true
      - artifact_id: section_instructions
        required: true
    outputs:
      - artifact_id: draft_sections
        content_type: json
        slot_id: draft_sections_slot
      - artifact_id: draft_document
        content_type: json
        slot_id: draft_slot
    acceptance_criteria: |
      draft_document and draft_sections artifacts must be saved with substantive prose
      following the outline and section instructions.

  review_document:
    label: Review Document
    allow_llm_save_artifact: false
    prompt: |
      用户的写作目标是：{{user_input}}

      {{runtime_instruction}}

      本步对初稿做一致性 / 质量审阅。调用 `check_consistency(draft_key="draft_document", writing_context_key="writing_context")`，收到确认后向用户简短回报即可。
    tools:
      - check_consistency
    inputs:
      - artifact_id: draft_document
        required: true
      - artifact_id: writing_context
        required: true
    outputs:
      - artifact_id: review_report
        content_type: json
        slot_id: review_slot
    acceptance_criteria: |
      review_report artifact must be saved with a numeric score, summary, and a
      list of issues.

  finalize_report:
    label: Finalize Report
    allow_llm_save_artifact: false
    prompt: |
      用户的写作目标是：{{user_input}}

      {{runtime_instruction}}

      本步结合审阅意见产出最终成稿。调用 `generate_writing_output(draft_key="draft_document", review_report_key="review_report", writing_context_key="writing_context")`，收到确认后向用户简短回报即可。
    tools:
      - generate_writing_output
    inputs:
      - artifact_id: draft_document
        required: true
      - artifact_id: review_report
        required: true
      - artifact_id: writing_context
        required: false
    outputs:
      - artifact_id: writing_output
        content_type: json
        slot_id: final_report_slot
    acceptance_criteria: |
      writing_output artifact must be saved as a self-contained polished Markdown
      article.
