initial: __start__

transitions:
  __start__:
    - to: build_context
      condition: "Cold start — always enter context building first."

  build_context:
    - to: generate_outline
      condition: "Context ready — proceed to outline planning."

  generate_outline:
    - to: plan_sections
      condition: "Outline accepted — proceed to per-section instruction planning."

  plan_sections:
    - to: generate_draft
      condition: "Section instructions ready — proceed to draft writing."

  generate_draft:
    - to: review_document
      condition: "Full draft produced — proceed to review."

  review_document:
    - to: finalize_report
      condition: "Review complete — proceed to finalization."

  finalize_report:
    - to: __end__
      condition: "Final report produced — pipeline complete."

steps:
  build_context:
    label: Build Context
    prompt: |
      {{runtime_instruction}}

      本步准备 writing_task、resource_profiles、writing_context 三件产物。

      第一步：调 build_writing_task(query="{{user_input}}") 拿到 writing_task 路径，用 save_artifact(content_type='file', key='writing_task') 落库。

      第二步：调 profile_resources(writing_task_path=<writing_task 路径>) 拿到 resource_profiles 路径，用 save_artifact(content_type='file', key='resource_profiles') 落库。

      第三步：调 create_writing_context(writing_task_path=<writing_task 路径>, resource_profiles_path=<resource_profiles 路径>) 拿到 writing_context 路径，用 save_artifact(content_type='file', key='writing_context') 落库。

      如果上述工具调用失败，不要进行任何额外的兜底操作，直接停止本步骤。尤其不要自行撰写内容进行落库。
    tools:
      - build_writing_task
      - profile_resources
      - create_writing_context
    outputs:
      - artifact_id: writing_task
        content_type: json
        slot_id: writing_task_slot
      - artifact_id: resource_profiles
        content_type: json
        slot_id: resource_profiles_slot
      - artifact_id: writing_context
        content_type: json
        slot_id: writing_context_slot
    acceptance_criteria: |
      writing_task、resource_profiles、writing_context 三个 artifact 均已保存；writing_context.context_id 非空；document_summary.summary 非空、key_points 至少 1 条；style_profile 含 audience、formality、tone 三字段。

  generate_outline:
    label: Generate Outline
    prompt: |
      {{runtime_instruction}}

      本步基于 writing_task + writing_context 生成结构化大纲，并把大纲内容同步回写作上下文。先调 get_artifact 取回 writing_task 和 writing_context，传给 generate_outline(writing_task_path=<writing_task 路径>, writing_context_path=<writing_context 路径>)，获得 outline 路径。

      大纲生成后，调 update_writing_context(content_artifact_path=<outline 路径>, writing_context_path=<原 writing_context 路径>)，获得更新后的 writing_context 路径。

      本步骤的所有生成操作完成后，调用 save_artifact(content_type='file', key='outline') 保存 outline 路径，再调用 save_artifact(content_type='file', key='writing_context') 保存更新后的 writing_context 路径。

      如果上述工具调用失败，不要进行任何额外的兜底操作，直接停止本步骤。尤其不要自行撰写内容进行落库。
    tools:
      - generate_outline
      - update_writing_context
    exclude_framework_tools:
      - read_user_attachment
      - find_user_attachment
    inputs:
      - artifact_id: writing_task
        required: true
      - artifact_id: writing_context
        required: true
    outputs:
      - artifact_id: outline
        content_type: json
        slot_id: outline_slot
      - artifact_id: writing_context
        content_type: json
        slot_id: writing_context_slot
    acceptance_criteria: |
      outline 已保存；nodes 至少 3 个；每个 node 至少含 node_id、title、instruction、constraints 字段且非空；writing_context 已保存一次，document_summary 已反映 outline 内容。

  plan_sections:
    label: Plan Sections
    prompt: |
      {{runtime_instruction}}

      本步为大纲中的所有顶层章节一次性生成写作指令。调 get_artifact 取回 writing_context 和 outline，调 generate_section_instructions(outline_path=<outline 路径>, writing_context_path=<writing_context 路径>)，把返回的路径用 save_artifact(content_type='file', key='section_instructions') 落库。

      如果上述工具调用失败，不要进行任何额外的兜底操作，直接停止本步骤。尤其不要自行撰写内容进行落库。
    tools:
      - generate_section_instructions
    exclude_framework_tools:
      - read_user_attachment
      - find_user_attachment
    inputs:
      - artifact_id: outline
        required: true
      - artifact_id: writing_context
        required: true
    outputs:
      - artifact_id: section_instructions
        content_type: json
        slot_id: section_instructions_slot
    acceptance_criteria: |
      section_instructions 已保存；为 SectionInstructionList Artifact（data.instructions 为数组），条目数与 outline.nodes 节点数一一对应；每条至少含 outline_node_id、section_title、section_goal、required_points 字段。

  generate_draft:
    label: Generate Draft
    prompt: |
      {{runtime_instruction}}

      本步按章节顺序撰写初稿正文，最后合并成完整文档。

      先调 get_artifact 取回 writing_task、writing_context、outline 和 section_instructions 的文件路径。准备一个 draft_section_paths 列表，用来记录每次工具返回的非空章节路径。

      调 generate_draft_section(writing_task_path=<writing_task 路径>, section_instructions_path=<section_instructions 路径>, writing_context_path=<writing_context 路径>) 生成下一章。工具内部会根据已经生成的章节文件判断当前应写哪一章。工具返回非空路径时，把该路径追加到 draft_section_paths，然后继续调用同一个工具生成下一章。

      工具返回空字符串时，表示章节初稿已经全部生成完成。此时取 draft_section_paths 中最后一个路径，调用 assemble_draft_document(draft_sections_anchor_path=<最后一个 draft_section 路径>, writing_context_path=<writing_context 路径>, outline_path=<outline 路径>)，获得 draft_document 路径。

      初稿文档生成后，调 update_writing_context(content_artifact_path=<draft_document 路径>, writing_context_path=<原 writing_context 路径>)，获得更新后的 writing_context 路径。

      本步骤的所有生成操作完成后，按 draft_section_paths 中的顺序逐个调用 save_artifact(content_type='file', key='draft_sections') 保存章节初稿路径，再调用 save_artifact(content_type='file', key='draft_document') 保存 draft_document 路径，最后调用 save_artifact(content_type='file', key='writing_context') 保存更新后的 writing_context 路径。

      如果上述工具调用失败，停止本步骤并保留工具错误信息，交由外层重试处理。
    tools:
      - generate_draft_section
      - assemble_draft_document
      - update_writing_context
    exclude_framework_tools:
      - read_user_attachment
      - find_user_attachment
    inputs:
      - artifact_id: writing_task
        required: true
      - artifact_id: writing_context
        required: true
      - artifact_id: outline
        required: true
      - artifact_id: section_instructions
        required: true
    outputs:
      - artifact_id: draft_sections
        content_type: json
        slot_id: draft_sections_slot
      - artifact_id: draft_document
        content_type: json
        slot_id: draft_slot
      - artifact_id: writing_context
        content_type: json
        slot_id: writing_context_slot
    acceptance_criteria: |
      draft_sections 已按章节顺序保存，数量与 section_instructions.data.instructions 一致，至少 2 个 DraftSection；每个 DraftSection 含 title 且 blocks 非空，每个 block 的 content 非空。draft_document 已保存一次，draft_document.sections 与 draft_sections 按顺序一一对应；writing_context 已保存一次，document_summary 已反映 draft_document 内容。

  review_document:
    label: Review Document
    prompt: |
      {{runtime_instruction}}

      本步对初稿做一致性与质量审阅。调 get_artifact 取回 writing_context 和 draft_document，传给 check_consistency，把返回的路径用 save_artifact(content_type='file', key='review_report') 落库。
    tools:
      - check_consistency
    exclude_framework_tools:
      - read_user_attachment
      - find_user_attachment
    inputs:
      - artifact_id: draft_document
        required: true
      - artifact_id: writing_context
        required: true
    outputs:
      - artifact_id: review_report
        content_type: json
        slot_id: review_slot
    acceptance_criteria: |
      review_report 已保存；result.is_passed 是布尔；result.score 是 0-100 数字；result.summary 是非空字符串；result.issues 是数组，每项含 severity（high/medium/low）、category、description 字段。

  finalize_report:
    label: Finalize Report
    prompt: |
      {{runtime_instruction}}

      本步在审阅完成后产出最终 Markdown 成稿。调 get_artifact 取回 writing_context、draft_document 和 review_report 的文件路径，传给 generate_writing_output(draft_path=<draft_document 路径>, review_report_path=<review_report 路径>, writing_context_path=<writing_context 路径>)，获得 writing_output 路径。

      本步骤的生成操作完成后，调用 save_artifact(content_type='file', key='writing_output') 保存 writing_output 路径。

      如果上述工具调用失败，停止本步骤并保留工具错误信息，交由外层重试处理。
    tools:
      - generate_writing_output
    exclude_framework_tools:
      - read_user_attachment
      - find_user_attachment
    inputs:
      - artifact_id: draft_document
        required: true
      - artifact_id: review_report
        required: true
      - artifact_id: writing_context
        required: true
    outputs:
      - artifact_id: writing_output
        content_type: json
        slot_id: final_report_slot
    acceptance_criteria: |
      writing_output 已保存；output_format 是 markdown；content 是非空字符串，含标题与至少 2 个二级章节（`## ` 开头），正文长度足以独立成篇。
